<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>EcoCity - Умный мониторинг баков</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>🌿 EcoCity</h1>
    <div class="subtitle">Мониторинг мусорных баков • Проект Анастасии</div>
    
    <div class="controls">
        <button id="connectBtn">🔌 Подключиться к Arduino</button>
        <select id="baudRate">
            <option value="9600">9600 бод</option>
        </select>
        <span id="status">Отключено</span>
    </div>
    
    <div class="container">
        <div class="map">
            <h2>🗺️ Карта контейнеров</h2>
            <div class="bins">
                <div class="bin" id="bin1">
                    <div class="bin-icon">🗑️</div>
                    <div class="bin-name">Бак №1 (Мой Лего-бак)</div>
                    <div class="bin-level" id="level1">Уровень: --%</div>
                    <div class="bin-indicator" id="indicator1">⚪</div>
                </div>
                <div class="bin" id="bin2">
                    <div class="bin-icon">🏫</div>
                    <div class="bin-name">Бак №2 (Школьный двор)</div>
                    <div class="bin-level" id="level2">Уровень: --%</div>
                    <div class="bin-indicator" id="indicator2">⚪</div>
                </div>
            </div>
        </div>
        
        <div class="stats">
            <h2>📊 Статистика</h2>
            <p>Последние данные с датчика:</p>
            <div id="lastUpdate">--:--:--</div>
            <div id="rawData">Ожидание данных...</div>
        </div>
    </div>
    
    <div class="footer">
        Сделано с ❤️ и Arduino • Анастасия, 10 класс • Челябинск
    </div>
    
    <script src="script.js"></script>
</body>
</html>
