<!DOCTYPE html>
<html>
<head>
    <title>CleanCity - Умный мониторинг баков</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>♻️ CleanCity</h1>
    <p>Мониторинг заполненности мусорных контейнеров в реальном времени</p>
    
    <div class="controls">
        <button id="connectBtn">🔌 Подключиться к Arduino</button>
        <select id="baudRate">
            <option value="9600">9600 бод</option>
        </select>
        <span id="status">Отключено</span>
    </div>
    
    <div class="container">
        <div class="map">
            <h2>Карта контейнеров</h2>
            <div class="bins">
                <div class="bin" id="bin1">
                    <div class="bin-icon">🗑️</div>
                    <div class="bin-name">Бак №1 (Лего-модель)</div>
                    <div class="bin-level" id="level1">Уровень: --%</div>
                    <div class="bin-indicator" id="indicator1">⚪</div>
                </div>
                <div class="bin" id="bin2">
                    <div class="bin-icon">🗑️</div>
                    <div class="bin-name">Бак №2 (Школа)</div>
                    <div class="bin-level" id="level2">Уровень: --%</div>
                    <div class="bin-indicator" id="indicator2">⚪</div>
                </div>
            </div>
        </div>
        
        <div class="stats">
            <h2>Статистика</h2>
            <p>Последние данные:</p>
            <div id="lastUpdate">--:--:--</div>
            <div id="rawData">Ожидание данных...</div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
